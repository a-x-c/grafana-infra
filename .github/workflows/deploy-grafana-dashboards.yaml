name: Grafana Dashboards (Terraform)

# Deploys Grafana Cloud dashboards, folders, datasources, and alerting via
# Terraform whenever JSON or TF under services/grafana/ changes.
#
# - On pull_request: validate dashboard JSON + run `terraform plan`, comment on PR.
# - On push to main: `terraform apply -auto-approve`.
#
# Secrets (mirror GCP Secret Manager via `just sync-secrets-to-gh`):
#   - GRAFANA_CLOUD_ACCESS_POLICY_TOKEN   — org-level bootstrap token (glc_…)
#   - GRAFANA_CLOUD_READER_SA_KEY         — JSON key for the GCP SA
# Auth to the GCS TF state bucket uses Workload Identity Federation
# (repo vars GCP_WORKLOAD_IDENTITY_PROVIDER / GCP_SERVICE_ACCOUNT).

on:
  pull_request:
    paths:
      - 'services/grafana/**'
      - '.github/workflows/deploy-grafana-dashboards.yaml'
  push:
    branches:
      - main
    paths:
      - 'services/grafana/**'
      - '.github/workflows/deploy-grafana-dashboards.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TF_DIR: services/grafana/infra
  TF_VERSION: '1.14.1'
  GRAFANA_DIR: services/grafana
  DASHBOARD_DIR: services/grafana/dashboards
  DASHBOARD_SCHEMA: services/grafana/schemas/grafana-dashboard-5.x.json
  PROJECT_SLUG: '{{project_slug}}'
  DISPLAY_NAME: '{{display_name}}'
  GRAFANA_URL: 'https://{{grafana_stack}}.grafana.net'

jobs:
  validate-dashboards:
    name: Validate Dashboard JSON
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install jsonschema
        run: pip install --quiet jsonschema==4.23.0

      - name: Validate every dashboard JSON
        env:
          PROJECT_SLUG: ${{ env.PROJECT_SLUG }}
          DISPLAY_NAME: ${{ env.DISPLAY_NAME }}
        run: |
          set -euo pipefail
          ${{ env.GRAFANA_DIR }}/scripts/validate-dashboards.py \
            --schema "${{ env.DASHBOARD_SCHEMA }}" \
            ${{ env.DASHBOARD_DIR }}/*.json

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate-dashboards
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Format Check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_cloud_access_policy_token: ${{ secrets.GRAFANA_CLOUD_ACCESS_POLICY_TOKEN }}
          TF_VAR_gcp_sa_jwt: ${{ secrets.GRAFANA_CLOUD_READER_SA_KEY }}
        run: terraform plan -no-color -input=false -out=tfplan
        continue-on-error: true

      - name: Comment Plan on PR
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const stdout = `${{ steps.plan.outputs.stdout }}`;
            const truncated = stdout.length > 60000
              ? stdout.slice(0, 60000) + "\n\n…(plan truncated, see Actions log)…"
              : stdout;
            const body = `#### Grafana dashboards — Terraform Plan \`${{ steps.plan.outcome }}\`

            <details><summary>Show plan</summary>

            \`\`\`
            ${truncated}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail on Plan Error
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: validate-dashboards
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_cloud_access_policy_token: ${{ secrets.GRAFANA_CLOUD_ACCESS_POLICY_TOKEN }}
          TF_VAR_gcp_sa_jwt: ${{ secrets.GRAFANA_CLOUD_READER_SA_KEY }}
        run: terraform apply -auto-approve -input=false

      - name: Summary
        run: |
          echo "### Grafana dashboards deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Folder: ${{ env.GRAFANA_URL }}/dashboards/f/${{ env.PROJECT_SLUG }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Files applied this run:" >> "$GITHUB_STEP_SUMMARY"
          for f in ${{ env.DASHBOARD_DIR }}/*.json; do
            [ -f "$f" ] || continue
            uid=$(python3 -c "import json; print(json.load(open('$f'))['uid'])")
            title=$(python3 -c "import json; print(json.load(open('$f'))['title'])")
            echo "- [\`$uid\`](${{ env.GRAFANA_URL }}/d/$uid) — $title" >> "$GITHUB_STEP_SUMMARY"
          done
